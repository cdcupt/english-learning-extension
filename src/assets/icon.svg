<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background rounded square -->
  <rect width="128" height="128" rx="24" fill="#2563EB"/>

  <!-- Open book shape -->
  <g transform="translate(64, 58)">
    <!-- Left page -->
    <path d="M-4,-20 L-4,18 Q-4,20 -6,20 L-36,20 Q-38,20 -38,18 L-38,-12 Q-38,-14 -36,-14 L-6,-20 Q-4,-20 -4,-18 Z" fill="white" opacity="0.95"/>
    <!-- Right page -->
    <path d="M4,-20 L4,18 Q4,20 6,20 L36,20 Q38,20 38,18 L38,-12 Q38,-14 36,-14 L6,-20 Q4,-20 4,-18 Z" fill="white" opacity="0.85"/>
    <!-- Spine -->
    <path d="M-4,-20 L0,-22 L4,-20 L4,20 L0,22 L-4,20 Z" fill="white" opacity="0.7"/>

    <!-- Text lines on left page -->
    <line x1="-32" y1="-6" x2="-10" y2="-6" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-32" y1="0" x2="-14" y2="0" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-32" y1="6" x2="-12" y2="6" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="-32" y1="12" x2="-18" y2="12" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Text lines on right page -->
    <line x1="10" y1="-6" x2="32" y2="-6" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="14" y1="0" x2="32" y2="0" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="12" y1="6" x2="32" y2="6" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="18" y1="12" x2="32" y2="12" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Headphones arc on top -->
  <g transform="translate(64, 42)">
    <path d="M-22,0 Q-22,-22 0,-22 Q22,-22 22,0" fill="none" stroke="white" stroke-width="4" stroke-linecap="round"/>
    <!-- Left earpiece -->
    <rect x="-26" y="-4" width="8" height="14" rx="4" fill="white" opacity="0.9"/>
    <!-- Right earpiece -->
    <rect x="18" y="-4" width="8" height="14" rx="4" fill="white" opacity="0.9"/>
  </g>

  <!-- "EN" text at bottom -->
  <text x="64" y="104" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="20" fill="white" letter-spacing="3" opacity="0.9">EN</text>
</svg>
